services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognitor-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5432:5432"
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: cognitoruser
      DB_PASSWORD: cognitorpassword
      DB_NAME: cognitor
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_API_URL: /api
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
