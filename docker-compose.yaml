services:
  db:
    image: postgres:16-alpine
    container_name: cognitor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cognitoruser
      POSTGRES_PASSWORD: cognitorpassword
      POSTGRES_DB: cognitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognitoruser -d cognitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cognitor-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: cognitoruser
      DB_PASSWORD: cognitorpassword
      DB_NAME: cognitor
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:3001
    container_name: cognitor-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  pgdata:
