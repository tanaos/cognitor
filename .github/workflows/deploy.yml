name: Deploy Managed Cognitor

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cognitor
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  publish-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  deploy:
    needs: publish-container
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy release
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF
            set -e

            docker pull ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}

            docker stop cognitor || true
            docker rm cognitor || true

            docker run -d \
              --name cognitor \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          EOF