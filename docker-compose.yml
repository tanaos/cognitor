services:
  cognitor:
    build:
      context: .
      cache_from:
        - type=local,src=.docker-cache/cognitor
      cache_to:
        - type=local,dest=.docker-cache/cognitor,mode=max
    container_name: cognitor

    ports:
      - "7530:7530"

    env_file:
      - .env

    volumes:
      - ./src:/app/src
      - cognitor_storage:/app/storage

    command: >
      uvicorn src.server.app:app
      --host 0.0.0.0
      --port 7530
      --reload

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:7530/', timeout=3)
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

    restart: unless-stopped

  cognitor-worker:
    image: ghcr.io/tanaos/cognitor-worker:latest
    container_name: cognitor-worker
    profiles:
      - worker
    env_file:
      - .env
    depends_on:
      cognitor:
        condition: service_healthy
    environment:
      DOCS_FOLDER: /data/docs
      COGNITOR_URL: ${COGNITOR_URL:-http://cognitor:7530}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${DOCS_FOLDER?DOCS_FOLDER must be set in .env}
        target: /data/docs
        read_only: true
    restart: unless-stopped

volumes:
  cognitor_storage:
    name: cognitor_storage