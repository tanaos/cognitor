services:
  cognitor:
    build: .
    container_name: cognitor

    ports:
      - "7530:7530"

    env_file:
      - .env

    volumes:
      - ./src:/app/src
      - cognitor_storage:/app/storage

    command: >
      uvicorn src.server.app:app
      --host 0.0.0.0
      --port 7530
      --reload

    restart: unless-stopped

  cognitor-worker:
    image: ghcr.io/tanaos/cognitor-worker:latest
    container_name: cognitor-worker
    profiles:
      - worker
    depends_on:
      - cognitor
    environment:
      DOCS_FOLDER: /data/docs
      COGNITOR_URL: ${COGNITOR_WORKER_URL:-http://cognitor:7530}
      COGNITOR_COLLECTION_NAME: ${COGNITOR_COLLECTION_NAME}
      COGNITOR_API_KEY: ${COGNITOR_API_KEY:-}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-300}
    volumes:
      - type: bind
        source: ${DOCS_FOLDER}
        target: /data/docs
        read_only: true
    restart: unless-stopped

volumes:
  cognitor_storage:
    name: cognitor_storage